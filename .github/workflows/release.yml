name: release

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    name: Release-plz
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
      htsget-lambda-tag: ${{ steps.lambda-tag.outputs.tag }}
      htsget-axum-version: ${{ steps.axum-tag.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Resolve htsget-lambda tag
        id: lambda-tag
        if: ${{ steps.release-plz.outputs.releases_created == 'true' }}
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          tag=$(echo "$RELEASES" | jq -r '.[] | select(.package_name == "htsget-lambda") | .tag')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Resolve htsget-axum version
        id: axum-tag
        if: ${{ steps.release-plz.outputs.releases_created == 'true' }}
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          version=$(echo "$RELEASES" | jq -r '.[] | select(.package_name == "htsget-axum") | .version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # Build and publish the Docker image whenever release-plz releases `htsget-axum`.
  docker-release:
    name: Publish Docker image
    needs: release
    # Run only when this release actually included htsget-axum.
    if: ${{ needs.release.outputs.htsget-axum-version != '' }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Login to GHCR.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/umccr/htsget-rs
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.htsget-axum-version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.htsget-axum-version }}
            type=raw,value=latest
      - name: Docker GitHub release
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          provenance: false
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  ## SOCI (Seekable OCI) support. Only enable when and if docker layers surpass 10MB in the future, see:
  # https://github.com/awslabs/soci-snapshotter/issues/100
  #      - name: Install aws SOCI
  #        uses: iamops-team/aws-soci@v1.0
  #      - name: Pull the image in containerd
  #        run: |
  #          sudo ctr i pull --user ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ghcr.io/umccr/htsget-rs:latest
  #      - name: Create and push soci index
  #        run: |
  #          sudo soci create ghcr.io/umccr/htsget-rs:latest
  #          sudo soci push --user ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ghcr.io/umccr/htsget-rs:latest

  # Build the htsget-lambda deployment artifact whenever release-plz publishes `htsget-lambda`
  lambda-artifact:
    name: Publish htsget-lambda (${{ matrix.arch }})
    needs: release
    # Run only when this release actually included htsget-lambda.
    if: ${{ needs.release.outputs.htsget-lambda-tag != '' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            build-flag: --arm64
            target-cpu: neoverse-n1
          - arch: x86_64
            build-flag: --x86-64
            target-cpu: x86-64-v3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cargo-lambda and Zig
        run: pip3 install cargo-lambda ziglang

      - name: Build htsget-lambda for ${{ matrix.arch }}
        env:
          RUSTFLAGS: "-C target-cpu=${{ matrix.target-cpu }}"
          CARGO_PROFILE_RELEASE_LTO: "true"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: "symbols"
        run: |
          cargo lambda build \
            --release \
            ${{ matrix.build-flag }} \
            --package htsget-lambda \
            --all-features \
            --output-format zip

      - name: Attach artifact to the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.htsget-lambda-tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          mv target/lambda/htsget-lambda/bootstrap.zip "$TAG-$ARCH.zip"
          gh release upload "$TAG" "$TAG-$ARCH.zip"

  # Notify the deployment repo that a new htsget-lambda release is ready.
  notify-deploy:
    name: Trigger deployment
    needs: [release, lambda-artifact]
    runs-on: ubuntu-latest
    permissions: {}
    env:
      # The deployment repo to notify.
      DEPLOY_REPO: umccr/htsget-pipeline
    steps:
      - name: Send htsget-lambda dispatch
        # Run only when this release actually included htsget-lambda.
        if: ${{ needs.release.outputs.htsget-lambda-tag != '' }}
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HTSGET_RS_DISPATCH_TOKEN }}
          repository: ${{ env.DEPLOY_REPO }}
          event-type: htsget-lambda-release
          client-payload: '{"tag": "${{ needs.release.outputs.htsget-lambda-tag }}"}'
